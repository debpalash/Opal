name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Pure-Zig unit tests — no native deps needed (build.zig's test step compiles
  # only the *_pure.zig modules), so this runs fast on every platform.
  unit-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
        experimental: [false]
        include:
          # Windows is tolerated-failing (experimental → continue-on-error):
          # the *_pure.zig modules have no native deps and should compile with
          # a stock Windows zig — no MSYS2 needed — but that's unproven on
          # real runners. Move windows-2022 into the main `os` axis once a few
          # runs come back green.
          - os: windows-2022
            experimental: true
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: zig build test
        run: zig build test

  # Full app build on macOS arm64 — the primary supported platform.
  # build.zig links against /opt/homebrew, which matches arm64 runners.
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Install native dependencies
        run: |
          brew update
          brew install mpv sqlite onnxruntime sdl2 libtorrent-rasterbar
      - name: Build (ReleaseSafe)
        run: zig build -Doptimize=ReleaseSafe
      - name: Binary exists
        run: test -x zig-out/bin/opal

  # Feature suite — source-level checks (DB schema, config, thread-safety
  # sweeps, script compilation) plus a full zig build, so it needs the same
  # native deps as build-macos. Optional components report as "skip".
  feature-suite:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Install native dependencies
        run: |
          brew update
          brew install mpv sqlite onnxruntime sdl2 libtorrent-rasterbar
      - name: Run tests/test_features.py
        run: python3 tests/test_features.py

  # Headless Docker image: the ONLY reliable gate for the hosted deployment
  # (macOS dev hosts cannot validate a Linux image). Builds the image, boots
  # it, and smoke-tests the unauthenticated surface: /health liveness and the
  # /pair code exchange (pinned via OPAL_PAIR_CODE) returning the token.
  docker-headless:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t opal:headless .
      - name: Boot + smoke
        run: |
          docker run -d --name opal -e OPAL_PAIR_CODE=123456 -p 41595:41595 opal:headless
          for i in $(seq 1 30); do
            curl -fs http://127.0.0.1:41595/health && break
            sleep 2
          done
          curl -fs http://127.0.0.1:41595/health | grep -q '"ok":true'
          curl -fs http://127.0.0.1:41595/ | grep -q 'Pair with Opal'
          curl -fs 'http://127.0.0.1:41595/pair?code=123456' | grep -qE '"token":"[0-9a-f]{32}"'
          # wrong code must 401
          ! curl -fs 'http://127.0.0.1:41595/pair?code=000000'
      - name: Logs on failure
        if: failure()
        run: docker logs opal || true
