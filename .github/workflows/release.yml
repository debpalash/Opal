name: Release

# Tag `vX.Y.Z` → build platform artifacts → publish a GitHub Release →
# push `opal` + `opal-bin` PKGBUILDs to AUR.
#
# Coverage today:
#   • macos-arm64    — Opal.app bundle (zip) + bare binary tarball    [primary]
#   • linux-x86_64   — binary tarball + .deb + .rpm + AppImage + .run [best-effort]
#   • windows-x86_64 — portable .zip + .msi (MSYS2/MINGW64 build +
#                      vendored MS onnxruntime; see the job for why)  [experimental]
#   • aur            — opal (source from release tarball) + opal-bin  [gated]
#                      (binary tarball repackage); gated on
#                      AUR_PUBLISH_ENABLED='true' + AUR_SSH_PRIVATE_KEY secret.
#
# Not covered: macos-x86_64 (GitHub retired the free Intel runner images —
# macos-13 queues forever; Intel Mac users build from source, where build.zig
# honors HOMEBREW_PREFIX=/usr/local), Linux arm64 (no runner deps verified).
# Extend the matrix as those land.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Install native dependencies
        run: |
          brew update
          brew install mpv sqlite onnxruntime sdl2 libtorrent-rasterbar create-dmg
      - name: Build .app bundle (ReleaseFast)
        # Bake the default TMDB/OMDb keys into the release binary so end users
        # work out of the box (build.zig reads these env vars). Absent secrets
        # resolve to "" — the build just falls back to bring-your-own-key.
        env:
          OPAL_TMDB_TOKEN: ${{ secrets.TMDB_API_TOKEN }}
          OPAL_OMDB_KEY: ${{ secrets.OMDB_API_KEY }}
        run: ./scripts/build-app.sh
      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ditto -c -k --keepParent dist/Opal.app "Opal-${VERSION}-macos-arm64.app.zip"
          tar -C zig-out/bin -czf "opal-${VERSION}-macos-arm64.tar.gz" opal
          # build-app.sh also emits dist/Opal-<ver>.dmg when create-dmg is present
          if ls dist/Opal-*.dmg >/dev/null 2>&1; then
            mv dist/Opal-*.dmg "Opal-${VERSION}-macos-arm64.dmg"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: |
            Opal-*-macos-arm64.app.zip
            Opal-*-macos-arm64.dmg
            opal-*-macos-arm64.tar.gz
          if-no-files-found: error

  linux-x86_64:
    runs-on: ubuntu-24.04
    # Best-effort: onnxruntime has no apt package on 24.04; we vendor the
    # upstream release. If this job breaks, the release still ships macOS.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential g++ pkg-config \
            libmpv-dev libsqlite3-dev libsdl2-dev libtorrent-rasterbar-dev ffmpeg \
            makeself
      - name: Vendor ONNX Runtime
        run: |
          ORT_VER=1.20.1
          curl -fsSL -o ort.tgz \
            "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VER}/onnxruntime-linux-x64-${ORT_VER}.tgz"
          tar xzf ort.tgz
          sudo cp -r onnxruntime-linux-x64-${ORT_VER}/include/* /usr/local/include/
          sudo cp -r onnxruntime-linux-x64-${ORT_VER}/lib/*     /usr/local/lib/
          sudo ldconfig
      - name: Build (ReleaseSafe)
        # Bake the default TMDB/OMDb keys into the release binary (see build.zig).
        env:
          OPAL_TMDB_TOKEN: ${{ secrets.TMDB_API_TOKEN }}
          OPAL_OMDB_KEY: ${{ secrets.OMDB_API_KEY }}
        run: zig build -Doptimize=ReleaseSafe -fsys=sdl2
      - name: Package binary tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p opal-${VERSION}-linux-x86_64
          cp zig-out/bin/opal opal-${VERSION}-linux-x86_64/
          cp libtorrent_wrapper.so opal-${VERSION}-linux-x86_64/ 2>/dev/null || true
          cp LICENSE docs/NOTICE.md README.md opal-${VERSION}-linux-x86_64/
          # Desktop entry + icon ride along so downstream repackagers
          # (AUR opal-bin, etc.) can install them from this one artifact.
          cp packaging/opal.desktop opal-${VERSION}-linux-x86_64/
          cp assets/logo.svg opal-${VERSION}-linux-x86_64/opal.svg
          tar czf "opal-${VERSION}-linux-x86_64.tar.gz" opal-${VERSION}-linux-x86_64
      - name: Package .deb + .rpm (nfpm)
        run: |
          # nfpm has no apt package — pin a release binary from GitHub.
          NFPM_VER=2.41.3
          curl -fsSL -o nfpm.tgz \
            "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VER}/nfpm_${NFPM_VER}_Linux_x86_64.tar.gz"
          tar xzf nfpm.tgz nfpm
          # packaging/nfpm.yaml interpolates ${VERSION} from the environment.
          export VERSION="${GITHUB_REF_NAME#v}"
          ./nfpm package -f packaging/nfpm.yaml -p deb -t "opal_${VERSION}_amd64.deb"
          ./nfpm package -f packaging/nfpm.yaml -p rpm -t "opal-${VERSION}-1.x86_64.rpm"
      - name: Package AppImage
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Assemble the AppDir by hand: binary + wrapper lib in a private
          # libdir, desktop file + icon at the AppDir root (appimagetool
          # requires those), .DirIcon for file managers.
          mkdir -p AppDir/usr/bin AppDir/usr/lib/opal
          cp zig-out/bin/opal AppDir/usr/bin/
          cp libtorrent_wrapper.so AppDir/usr/lib/opal/
          cp packaging/opal.desktop AppDir/opal.desktop
          cp assets/logo.svg AppDir/opal.svg
          cp assets/logo.svg AppDir/.DirIcon
          # AppRun: the AppImage runtime sets $APPDIR to the mount point; point
          # the loader at the bundled wrapper lib, then exec the binary.
          cat > AppDir/AppRun <<'EOF'
          #!/bin/sh
          HERE="${APPDIR:-$(dirname "$(readlink -f "$0")")}"
          export LD_LIBRARY_PATH="$HERE/usr/lib/opal${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
          exec "$HERE/usr/bin/opal" "$@"
          EOF
          chmod +x AppDir/AppRun
          # appimagetool itself ships as an AppImage; the runner has no FUSE,
          # so --appimage-extract-and-run unpacks it to a temp dir first.
          curl -fsSL -o appimagetool \
            "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run AppDir "Opal-${VERSION}-x86_64.AppImage"
      - name: Package .run installer (makeself)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Staging dir is the self-extracting payload; install.sh runs from
          # inside it after extraction and copies into /usr/local (needs sudo).
          mkdir -p staging
          cp zig-out/bin/opal staging/
          cp libtorrent_wrapper.so staging/
          cp packaging/opal.desktop staging/
          cp assets/logo.svg staging/opal.svg
          cp LICENSE staging/
          cat > staging/install.sh <<'EOF'
          #!/bin/sh
          set -e
          PREFIX="${PREFIX:-/usr/local}"
          install -Dm755 opal                  "$PREFIX/bin/opal"
          install -Dm755 libtorrent_wrapper.so "$PREFIX/lib/opal/libtorrent_wrapper.so"
          install -Dm644 opal.desktop          "$PREFIX/share/applications/opal.desktop"
          install -Dm644 opal.svg              "$PREFIX/share/icons/hicolor/scalable/apps/opal.svg"
          echo "Opal installed to $PREFIX/bin/opal"
          EOF
          chmod +x staging/install.sh
          makeself staging/ "opal-${VERSION}-linux-x86_64.run" "Opal ${VERSION}" ./install.sh
      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: |
            opal-*-linux-x86_64.tar.gz
            opal_*_amd64.deb
            opal-*.x86_64.rpm
            Opal-*-x86_64.AppImage
            opal-*-linux-x86_64.run
          if-no-files-found: error

  # ── EXPERIMENTAL ─────────────────────────────────────────────────────────
  # First release cycle for the Windows port. continue-on-error keeps the
  # release shipping (publish gates on macos-arm64 only) even when this job
  # breaks; drop the flag once a few tagged builds have produced working
  # artifacts.
  windows-x86_64:
    runs-on: windows-2022
    continue-on-error: true
    defaults:
      run:
        # Build steps run inside the MSYS2 environment: zig build shells out
        # to `sh` + g++ for the torrent wrapper, and pacman/ldd only exist
        # here. Packaging steps that need Windows tooling override with pwsh.
        shell: msys2 {0}
    steps:
      - name: Force LF checkout
        # build.zig's torrent-wrapper step runs through MSYS2 `sh`; CRLF
        # endings would break it. Must run before checkout — and before MSYS2
        # exists, hence pwsh.
        shell: pwsh
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          # MINGW64, not UCRT64 (issue #3). v0.1.0 built here against UCRT64
          # packages, but zig's x86_64-windows-gnu target emits MSVCRT-flavored
          # MinGW binaries — the UCRT64 DLLs import CRT symbols (strtod, …)
          # from a different runtime, and the mismatch surfaced on user
          # machines as "entry point strtod could not be located in opal.exe".
          # MINGW64 packages link the same msvcrt the zig output does. The one
          # UCRT64-only dep, onnxruntime (no mingw-w64-x86_64-onnxruntime
          # exists — packages.msys2.org 404s for the mingw64 repo), is instead
          # vendored from Microsoft's official MSVC release below.
          msystem: MINGW64
          # Inherit the Windows PATH so zig.exe (installed by setup-zig below)
          # is visible inside this shell.
          path-type: inherit
          update: true
          # Names verified against https://packages.msys2.org (mingw64 repo,
          # 2026-07). pkgconf Provides: pkg-config — the old standalone
          # pkg-config package is gone. `unzip` (msys repo) unpacks the
          # vendored onnxruntime zip.
          install: >-
            git
            unzip
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-mpv
            mingw-w64-x86_64-sqlite3
            mingw-w64-x86_64-libtorrent-rasterbar
            mingw-w64-x86_64-pkgconf

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Vendor ONNX Runtime (Microsoft MSVC build)
        run: |
          # MSVC-built but pure-C-ABI, so it's safe to import from the
          # windows-gnu binary; build.zig picks up include/ + lib/onnxruntime.lib
          # via ONNXRUNTIME_DIR. Pin 1.24.x: its DLL serves ORT_API_VERSION 24,
          # exactly what the vendored ort/onnxruntime_c_api.h header requests —
          # an older DLL would make OrtGetApiBase()->GetApi(24) return NULL and
          # silently disable OCR.
          ORT_VER=1.24.4
          curl -fsSL -o ort.zip \
            "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VER}/onnxruntime-win-x64-${ORT_VER}.zip"
          unzip -q ort.zip
          # pwd -W prints the Windows-style path (D:/a/...) so the value works
          # for zig and pwsh steps alike.
          echo "ONNXRUNTIME_DIR=$(pwd -W)/onnxruntime-win-x64-${ORT_VER}" >> "$GITHUB_ENV"

      - name: Build (ReleaseSafe)
        # Bake the default TMDB/OMDb keys into the release binary (see build.zig).
        env:
          OPAL_TMDB_TOKEN: ${{ secrets.TMDB_API_TOKEN }}
          OPAL_OMDB_KEY: ${{ secrets.OMDB_API_KEY }}
        run: zig build -Doptimize=ReleaseSafe

      - name: Stage portable payload (exe + wrapper + DLL closure)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          mkdir -p staging
          cp zig-out/bin/opal.exe staging/
          # The torrent wrapper lands next to the repo root (sh step in
          # build.zig). The Windows build names it torrent_wrapper.dll — NO
          # lib prefix (zig's windows-gnu -l search tries `{name}.dll` first,
          # and the PE import table then references that exact name).
          found_wrapper=""
          for f in torrent_wrapper.dll libtorrent_wrapper.dll libtorrent_wrapper.so; do
            if [ -f "$f" ]; then cp "$f" staging/; found_wrapper=1; fi
          done
          if [ -z "$found_wrapper" ]; then
            echo "::error::torrent wrapper DLL not found at repo root"
            exit 1
          fi
          # The vendored onnxruntime.dll lives outside MINGW_PREFIX, so the
          # prefix filter below never harvests it — stage it explicitly. It IS
          # in the exe's import table (linked via onnxruntime.lib), so a copy
          # next to opal.exe is mandatory. providers_shared rides along: ORT
          # dlopens it whenever an execution provider is requested.
          cp "${ONNXRUNTIME_DIR}/lib/onnxruntime.dll" staging/
          cp "${ONNXRUNTIME_DIR}/lib/onnxruntime_providers_shared.dll" staging/ 2>/dev/null || true
          # onnxruntime.dll is Microsoft's MSVC build: it imports the VC++
          # runtime (msvcp140*, vcruntime140*), which Windows does NOT ship
          # inbox (the api-ms-win-crt-* UCRT api-sets it also imports ARE
          # inbox on Win10+). App-local copies spare users the
          # "VCRUNTIME140.dll was not found" cousin of issue #3. Prefer the
          # sanctioned VS Redist copies on the runner; fall back to System32
          # (same binaries).
          vcredist=$(ls -d "/c/Program Files/Microsoft Visual Studio/2022/"*"/VC/Redist/MSVC/"*"/x64/Microsoft.VC143.CRT" 2>/dev/null | head -n1 || true)
          for crt in msvcp140.dll msvcp140_1.dll vcruntime140.dll vcruntime140_1.dll; do
            if [ -n "$vcredist" ] && [ -f "$vcredist/$crt" ]; then
              cp "$vcredist/$crt" staging/
            elif [ -f "/c/Windows/System32/$crt" ]; then
              cp "/c/Windows/System32/$crt" staging/
            else
              echo "::error::VC++ runtime $crt not found on runner"
              exit 1
            fi
          done
          # DLL closure — fixpoint, not a single pass. `ldd` on a PE binary
          # resolves against *this shell's* PATH (/mingw64/bin), so one pass
          # over the exe misses DLLs that only enter the closure through other
          # copied DLLs. v0.1.0's single pass shipped a zip missing
          # libbrotlidec/libintl-8/libpng16-16 exactly that way (issue #3).
          # Re-run ldd over everything staged, copy every dependency under the
          # MSYS2 prefix not yet staged, and repeat until a pass stages
          # nothing. Windows system DLLs (kernel32, …) stay behind.
          while :; do
            copied=0
            for bin in staging/*.exe staging/*.dll staging/*.so; do
              [ -f "$bin" ] || continue
              deps=$(ldd "$bin" 2>/dev/null | awk '/=>/ {print $3}' | grep -i "^${MINGW_PREFIX}/" || true)
              for dll in $deps; do
                dest="staging/$(basename "$dll")"
                if [ ! -e "$dest" ]; then
                  cp "$dll" "$dest"
                  echo "staged $(basename "$dll")"
                  copied=1
                fi
              done
            done
            if [ "$copied" -eq 0 ]; then break; fi
          done
          # Any import the loader cannot resolve at all is fatal — fail the
          # job rather than ship another zip that dies on a user's machine.
          # Cover both ldd failure modes: per-line "not found" markers and a
          # hard non-zero exit when the target itself refuses to load.
          unresolved=""
          for bin in staging/*.exe staging/*.dll staging/*.so; do
            [ -f "$bin" ] || continue
            if out=$(ldd "$bin" 2>&1); then
              misses=$(printf '%s\n' "$out" | grep -i 'not found' || true)
              if [ -n "$misses" ]; then
                unresolved="${unresolved}$(basename "$bin"): ${misses}"$'\n'
              fi
            else
              unresolved="${unresolved}$(basename "$bin"): ldd failed: ${out}"$'\n'
            fi
          done
          if [ -n "$unresolved" ]; then
            echo "::error::unresolved DLL imports in staging/:"
            printf '%s' "$unresolved"
            exit 1
          fi
          cp LICENSE docs/NOTICE.md staging/
          cat > staging/README.txt <<EOF
          Opal ${VERSION} — portable Windows build (x86_64, experimental)

          Run opal.exe. Keep every DLL in this folder next to it — they are
          the MSYS2/MINGW64 runtime (plus Microsoft's onnxruntime and the
          VC++ runtime it needs) that the binary was built against.

          Prefer a normal installer? Grab Opal-${VERSION}-windows-x86_64.msi
          from the same release page (Start Menu shortcut included).

          https://github.com/debpalash/Opal
          EOF
          echo "--- staged payload ---"
          ls -l staging/

      - name: Smoke test — launch opal.exe outside MSYS2 (issue #3 gate)
        shell: pwsh
        run: |
          # pwsh here has no /mingw64/bin on PATH — the same DLL-search world
          # as a user's machine, which is precisely where v0.1.0 fell over. If
          # staging/ is not a self-sufficient closure, the loader kills the
          # process at startup and this step fails the job.
          # Suppress the loader's modal "DLL not found" dialog first: without
          # this a load failure sits "alive" behind a message box for the whole
          # sleep and the test would pass vacuously. Error mode is inherited by
          # child processes.
          $sig = '[DllImport("kernel32.dll")] public static extern uint SetErrorMode(uint uMode);'
          Add-Type -MemberDefinition $sig -Name ErrMode -Namespace Win32
          # SEM_FAILCRITICALERRORS | SEM_NOGPFAULTERRORBOX | SEM_NOOPENFILEERRORBOX
          [void][Win32.ErrMode]::SetErrorMode(0x8003)
          $staging = Join-Path $PWD 'staging'
          # Working directory = staging so torrent_wrapper.dll & friends
          # resolve exactly as they do for a user double-clicking the exe.
          $proc = Start-Process -FilePath (Join-Path $staging 'opal.exe') `
            -WorkingDirectory $staging -PassThru
          # Cache the handle now — without this, .ExitCode is $null after the
          # process dies (long-standing Start-Process -PassThru quirk).
          $null = $proc.Handle
          Start-Sleep -Seconds 10
          $alive = Get-Process -Id $proc.Id -ErrorAction SilentlyContinue
          if (-not $alive -or $proc.HasExited) {
            $code = if ($proc.HasExited) { $proc.ExitCode } else { 'unknown' }
            Write-Host "::error::opal.exe died within 10s (exit code: $code) — incomplete DLL closure or CRT mismatch"
            exit 1
          }
          Write-Host "opal.exe still running after 10s — launch smoke test passed"
          Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          exit 0

      - name: Package portable zip
        shell: pwsh
        run: Compress-Archive -Path staging\* -DestinationPath "opal-${env:VERSION}-windows-x86_64.zip"

      - name: Package MSI (WiX 3)
        shell: pwsh
        run: |
          # windows-2022 images ship WiX Toolset 3.14 preinstalled, but its
          # bin dir is not on PATH — use absolute paths.
          $wix = "C:\Program Files (x86)\WiX Toolset v3.14\bin"
          # MSI ProductVersion must be numeric x.y.z — strip any pre-release
          # suffix (0.3.1-rc1 -> 0.3.1). The artifact filename keeps the full
          # tag version.
          $msiVersion = ($env:VERSION -split '-')[0]
          # heat harvests the exact staged dir the zip ships, into the
          # ComponentGroup "OpalFiles" referenced by packaging/windows/opal.wxs.
          & "$wix\heat.exe" dir staging -nologo -cg OpalFiles -dr INSTALLFOLDER `
              -srd -sfrag -scom -sreg -gg -var var.StagingDir -out harvest.wxs
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          # Every -d must be quoted: PowerShell's native-arg passing splits
          # unquoted `-dName=path.ext` tokens (attempt #2: candle received a
          # literal '.ico' as its source).
          & "$wix\candle.exe" -nologo -arch x64 `
              "-dProductVersion=$msiVersion" "-dStagingDir=staging" `
              "-dIconPath=packaging\windows\opal.ico" `
              packaging\windows\opal.wxs harvest.wxs
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          # -sval skips ICE validation: heat-generated fragments trip advisory
          # ICEs and validation needs an interactive session on some runners;
          # the produced MSI is unaffected.
          & "$wix\light.exe" -nologo -sval opal.wixobj harvest.wixobj `
              -o "Opal-${env:VERSION}-windows-x86_64.msi"
          exit $LASTEXITCODE

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: |
            opal-*-windows-x86_64.zip
            Opal-*-windows-x86_64.msi
          if-no-files-found: error

  # ── Browser extension (Opal Connect) ────────────────────────────────────
  # Builds the Chrome + Firefox packages and ships them as release assets.
  extension:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build Opal Connect (Chrome + Firefox)
        working-directory: extension
        run: |
          npm install
          npx extension build --browser chrome  --zip --polyfill
          npx extension build --browser firefox --zip --polyfill
          VER=$(node -p "require('./manifest.json').version")
          mkdir -p out
          cp "dist/chrome/opal-connect-${VER}.zip"  "out/opal-connect-${VER}-chrome.zip"
          cp "dist/firefox/opal-connect-${VER}.zip" "out/opal-connect-${VER}-firefox.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: extension
          path: extension/out/opal-connect-*.zip
          if-no-files-found: error

  publish:
    needs: [macos-arm64, linux-x86_64, windows-x86_64, extension]
    # macos-arm64 must succeed; the best-effort jobs contribute artifacts only
    # when they happen to pass (unmatched globs below just warn).
    if: always() && needs.macos-arm64.result == 'success'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate SHA256SUMS.txt
        # scripts/install.sh verifies every download against this manifest.
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/Opal-*-macos-arm64.app.zip
            artifacts/Opal-*-macos-arm64.dmg
            artifacts/opal-*-macos-arm64.tar.gz
            artifacts/opal-*-linux-x86_64.tar.gz
            artifacts/opal_*_amd64.deb
            artifacts/opal-*.x86_64.rpm
            artifacts/Opal-*-x86_64.AppImage
            artifacts/opal-*-linux-x86_64.run
            artifacts/opal-*-windows-x86_64.zip
            artifacts/Opal-*-windows-x86_64.msi
            artifacts/opal-connect-*.zip
            artifacts/SHA256SUMS.txt
          generate_release_notes: true
          draft: false

  # ── AUR publish ─────────────────────────────────────────────────────────
  # Auto-updates `opal` (source build from the release tarball) and `opal-bin`
  # (repackage the official binary tarball) on every vX.Y.Z tag. Skipped until
  # the `AUR_SSH_PRIVATE_KEY` repo secret is set; this lets the rest of the
  # release ship even before AUR is wired up.
  aur:
    needs: publish
    runs-on: ubuntu-24.04
    # Arch container, not a bare Ubuntu runner: AUR rejects a push whose
    # .SRCINFO is missing or stale, and only `makepkg --printsrcinfo` can
    # produce it from a PKGBUILD. `updpkgsums` (pacman-contrib) likewise fills
    # the sha256sums from the now-public release URLs.
    container: archlinux:base-devel
    # GitHub Actions does not allow `secrets.*` in a job-level `if:`.
    # Gate on vars only here; push-to-aur.sh verifies the secret is set
    # and bails with a clear message if AUR_SSH_PRIVATE_KEY is empty.
    if: ${{ vars.AUR_PUBLISH_ENABLED == 'true' }}
    steps:
      - name: Install Arch tooling
        run: pacman -Syu --noconfirm --needed git openssh pacman-contrib
      - uses: actions/checkout@v4
      - name: Create the makepkg user
        # makepkg (and updpkgsums, which shells out to it) refuse to run as
        # root. Everything the script touches must therefore be writable by
        # `builder`, including $HOME where the SSH key is materialised.
        run: |
          useradd -m builder
          chown -R builder "$GITHUB_WORKSPACE"
      # AUR_SKIP_MAKEPKG=1: the release job publishes metadata, it does not
      # need to compile Opal a fourth time — ci.yml's native Arch job is the
      # build proof.
      - name: Push PKGBUILDs to AUR
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          AUR_USERNAME: ${{ vars.AUR_USERNAME }}
          AUR_EMAIL: ${{ vars.AUR_EMAIL }}
          AUR_SKIP_MAKEPKG: "1"
        run: |
          sudo -u builder --preserve-env=AUR_SSH_PRIVATE_KEY,AUR_USERNAME,AUR_EMAIL,AUR_SKIP_MAKEPKG \
            env HOME=/home/builder ./packaging/aur/push-to-aur.sh
