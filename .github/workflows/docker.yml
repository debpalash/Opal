# Build the headless-server image and publish it to GHCR (ghcr.io/debpalash/opal).
#
# The Dockerfile compiles the whole Zig app + native deps INSIDE the image on a
# Linux runner (it is not buildable on the macOS dev host), so CI is the real
# gate. Auth uses the auto-provisioned GITHUB_TOKEN — `packages: write` below is
# all that is needed; no PAT.
name: Docker (GHCR)

on:
  workflow_dispatch: {}          # manual "build a release image now"
  release:
    types: [published]           # every published GitHub release
  push:
    tags: ["v*"]                 # and every version tag

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/opal

jobs:
  image:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # :latest on the default branch, :vX.Y.Z + :X.Y.Z on tags, plus :sha.
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=sha,format=short

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Build into the local daemon first so we can actually RUN the container
      # and prove it serves before publishing (the Linux image had never been
      # started — see docs/headless-server-spec.md §2).
      - name: Build for smoke test (load, linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: opal:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test the container (/health, /pair, web UI)
        run: |
          set -euo pipefail
          docker run -d --name opal -p 41595:41595 -e OPAL_PAIR_CODE=123456 opal:ci
          echo "── what the binary links (S1 will drop SDL/X11) ──"
          docker exec opal sh -c 'ldd /usr/local/bin/opal | grep -Ei "sdl|libx11" || echo "(no SDL/X11 in ldd)"' || true
          echo "── wait for /health ──"
          ok=""
          for i in $(seq 1 30); do
            if curl -fsS -o /dev/null http://localhost:41595/health; then ok=1; break; fi
            sleep 2
          done
          if [ -z "$ok" ]; then echo "FAIL: /health never came up"; docker logs opal; exit 1; fi
          echo "health OK"
          echo "── pair ──"
          TOKEN=$(curl -fsS "http://localhost:41595/pair?code=123456" || true)
          echo "$TOKEN" | grep -q '"token"' || { echo "FAIL: pairing"; docker logs opal; exit 1; }
          echo "── web UI ──"
          curl -fsS http://localhost:41595/ | grep -qiE 'opal|<!doctype' || { echo "FAIL: web UI"; exit 1; }
          echo "SMOKE OK"
          docker logs opal | tail -20
          docker rm -f opal

      - name: Push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
