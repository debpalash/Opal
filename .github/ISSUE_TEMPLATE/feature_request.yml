name: Feature request
description: Propose an improvement or new capability
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation where you missed this feature.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you considered
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This belongs in the core app (not a content plugin — see CONTENT_POLICY.md)
