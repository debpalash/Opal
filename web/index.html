<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0c0c11">
<title>Opal — Play everything</title>
<style>
/* Opal Anywhere — theme tokens ported from src/ui/theme.zig (midnight) */
:root{
  --bg-app:#0c0c11; --bg-surface:#14141c; --bg-elevated:#1c1c26; --bg-hover:#232330;
  --border:#2a2a38; --text-1:#e8e8f0; --text-2:#a0a0b4; --text-3:#6c6c80;
  --accent:#8ab4ff; --accent-dim:#3a4a6a; --success:#7dd87d; --danger:#ff7a7a;
  --rad:10px; --rad-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--bg-app);color:var(--text-1);font:15px/1.45 -apple-system,system-ui,Segoe UI,Roboto,sans-serif;
  padding-bottom:calc(64px + env(safe-area-inset-bottom))}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input{font:inherit;color:var(--text-1)}

/* ── Pairing screen ── */
#pair-screen{position:fixed;inset:0;background:var(--bg-app);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;z-index:50;padding:24px;text-align:center}
#pair-screen h1{font-size:26px;font-weight:700}
#pair-screen p{color:var(--text-2);max-width:340px}
#pair-code{width:200px;text-align:center;letter-spacing:8px;font-size:24px;padding:12px;
  background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--rad);outline:none}
#pair-code:focus{border-color:var(--accent)}
#pair-btn{background:var(--accent);color:#0c0c11;font-weight:600;padding:12px 32px;border-radius:var(--rad)}
#pair-err{color:var(--danger);min-height:20px;font-size:13px}

/* ── Header ── */
header{display:flex;align-items:center;gap:10px;padding:14px 16px 8px}
header .logo{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,#8ab4ff,#6a5acd)}
header h1{font-size:19px;font-weight:700}
header .dot{margin-left:auto;width:9px;height:9px;border-radius:50%;background:var(--text-3)}
header .dot.on{background:var(--success)}

/* ── Tabs (bottom) ── */
nav{position:fixed;left:0;right:0;bottom:0;display:flex;background:rgba(20,20,28,.92);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid var(--border);
  padding-bottom:env(safe-area-inset-bottom);z-index:40}
nav button{flex:1;padding:11px 0 9px;color:var(--text-3);font-size:12px;display:flex;flex-direction:column;
  align-items:center;gap:3px}
nav button.on{color:var(--accent)}
nav svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

main{padding:6px 16px 16px;max-width:640px;margin:0 auto}
.page{display:none}.page.on{display:block}

/* ── Now Playing ── */
#np-title{font-size:17px;font-weight:600;margin:18px 0 4px;word-break:break-word}
#np-sub{color:var(--text-3);font-size:13px}
.seek-wrap{margin:22px 0 6px}
input[type=range]{width:100%;appearance:none;-webkit-appearance:none;height:26px;background:transparent}
input[type=range]::-webkit-slider-runnable-track{height:5px;border-radius:3px;background:var(--bg-elevated)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;
  background:var(--accent);margin-top:-6.5px}
.times{display:flex;justify-content:space-between;color:var(--text-3);font-size:12px;font-variant-numeric:tabular-nums}
.transport{display:flex;align-items:center;justify-content:center;gap:18px;margin:22px 0}
.transport button{width:56px;height:56px;border-radius:50%;background:var(--bg-elevated);display:flex;
  align-items:center;justify-content:center;transition:background .15s}
.transport button:active{background:var(--bg-hover)}
.transport button.big{width:74px;height:74px;background:var(--accent);color:#0c0c11}
.transport svg{width:26px;height:26px;fill:currentColor;stroke:none}
.vol-row{display:flex;align-items:center;gap:12px;margin-top:10px}
.vol-row button{color:var(--text-2);width:40px;height:40px;display:flex;align-items:center;justify-content:center}
.vol-row svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.8}
.quick{display:flex;gap:8px;margin-top:22px;flex-wrap:wrap}
.quick button{background:var(--bg-elevated);border:1px solid var(--border);border-radius:999px;
  color:var(--text-2);padding:8px 16px;font-size:13px}

/* ── Search ── */
.search-row{display:flex;gap:8px;margin:12px 0}
#q{flex:1;background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--rad);
  padding:11px 14px;outline:none}
#q:focus{border-color:var(--accent)}
#go{background:var(--accent);color:#0c0c11;font-weight:600;border-radius:var(--rad);padding:0 18px}
.hint{color:var(--text-3);font-size:13px;margin:8px 2px}
.result{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--rad);
  padding:10px 12px;margin-bottom:8px}
.result .t{font-size:14px;word-break:break-word}
.result .m{display:flex;gap:10px;color:var(--text-3);font-size:12px;margin-top:4px;align-items:center}
.result .src{background:var(--bg-elevated);border-radius:999px;padding:1px 9px;color:var(--text-2)}
.result .play{margin-left:auto;color:var(--accent);font-weight:600;padding:6px 12px;
  background:var(--bg-elevated);border-radius:var(--rad-sm)}

/* ── Activity ── */
.sect{color:var(--text-2);font-weight:600;font-size:13px;text-transform:uppercase;
  letter-spacing:.06em;margin:18px 0 8px}
.file{display:flex;align-items:center;gap:10px;background:var(--bg-surface);border:1px solid var(--border);
  border-radius:var(--rad);padding:10px 12px;margin-bottom:6px;font-size:14px}
.file .n{flex:1;word-break:break-word}
.file .play{color:var(--accent);font-weight:600}
.empty{color:var(--text-3);text-align:center;padding:30px 0}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--text-3);border-top-color:var(--accent);
  border-radius:50%;animation:sp .8s linear infinite;vertical-align:-2px}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="pair-screen">
  <div class="logo" style="width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#8ab4ff,#6a5acd)"></div>
  <h1>Pair with Opal</h1>
  <p>Enter the 6-digit code from <b>Settings › Scripts › Web Remote Control</b> on your computer.</p>
  <input id="pair-code" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="••••••" autocomplete="one-time-code">
  <button id="pair-btn">Connect</button>
  <div id="pair-err"></div>
</div>

<header>
  <div class="logo"></div><h1>Opal</h1><div class="dot" id="conn-dot"></div>
</header>

<main>
  <!-- Now Playing -->
  <section class="page on" id="page-np">
    <div id="np-title">Nothing playing</div>
    <div id="np-sub">Play something from Search, or on the desktop.</div>
    <div class="seek-wrap"><input type="range" id="seek" min="0" max="100" value="0"></div>
    <div class="times"><span id="t-pos">--:--</span><span id="t-dur">--:--</span></div>
    <div class="transport">
      <button id="b-back" aria-label="Back 10s"><svg viewBox="0 0 24 24"><path d="M11 19V5l-9 7 9 7zm2-14v14l9-7-9-7z" transform="scale(-1,1) translate(-24,0)"/></svg></button>
      <button id="b-toggle" class="big" aria-label="Play/Pause"><svg id="i-pp" viewBox="0 0 24 24"><path d="M8 5v14l11-7L8 5z"/></svg></button>
      <button id="b-fwd" aria-label="Forward 10s"><svg viewBox="0 0 24 24"><path d="M11 19V5l-9 7 9 7zm2-14v14l9-7-9-7z"/></svg></button>
    </div>
    <div class="vol-row">
      <button id="b-mute" aria-label="Mute"><svg viewBox="0 0 24 24"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/></svg></button>
      <input type="range" id="vol" min="0" max="130" value="100">
    </div>
    <div class="quick">
      <button id="b-sub">Subtitles ⭢</button>
      <button id="b-aud">Audio ⭢</button>
      <button id="b-fs">Fullscreen</button>
    </div>
  </section>

  <!-- Search -->
  <section class="page" id="page-search">
    <div class="search-row">
      <input id="q" placeholder="Search everything…" autocapitalize="off">
      <button id="go">Go</button>
    </div>
    <div class="hint" id="search-hint">Results play on the desktop.</div>
    <div id="results"></div>
  </section>

  <!-- Activity -->
  <section class="page" id="page-act">
    <div class="sect">Queue</div>
    <div id="queue"></div>
    <div class="sect">Downloads</div>
    <div id="downloads"></div>
    <div class="sect">History</div>
    <div id="history"></div>
  </section>
</main>

<nav>
  <button data-page="np" class="on"><svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="13" rx="2"/><path d="M8 21h8"/></svg>Now Playing</button>
  <button data-page="search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>Search</button>
  <button data-page="act"><svg viewBox="0 0 24 24"><path d="M12 3v12m0 0 4-4m-4 4-4-4"/><path d="M4 19h16"/></svg>Activity</button>
</nav>

<script>
'use strict';
const BASE = location.origin.startsWith('http') ? location.origin : 'http://' + location.hostname + ':41595';
let TOKEN = localStorage.getItem('opal_token') || '';

const $ = id => document.getElementById(id);
const api = (path) => fetch(BASE + '/api' + path, { headers: TOKEN ? { Authorization: 'Bearer ' + TOKEN } : {} })
  .then(r => { if (r.status === 401) { unpair(); throw 0; } return r.json(); });

// ── Pairing ──
function unpair(){ TOKEN=''; localStorage.removeItem('opal_token'); $('pair-screen').style.display='flex'; }
function paired(){ $('pair-screen').style.display='none'; poll(); }
$('pair-btn').onclick = async () => {
  const code = $('pair-code').value.trim();
  if (code.length !== 6) { $('pair-err').textContent = 'Enter all 6 digits'; return; }
  $('pair-err').textContent = '';
  try {
    const r = await fetch(BASE + '/pair?code=' + encodeURIComponent(code));
    if (!r.ok) { $('pair-err').textContent = 'Wrong code — check Settings on the desktop'; return; }
    const d = await r.json();
    if (d.token) { TOKEN = d.token; localStorage.setItem('opal_token', TOKEN); paired(); }
  } catch { $('pair-err').textContent = 'Can’t reach Opal — same Wi-Fi?'; }
};
$('pair-code').addEventListener('keydown', e => { if (e.key === 'Enter') $('pair-btn').click(); });

// ── Tabs ──
document.querySelectorAll('nav button').forEach(b => b.onclick = () => {
  document.querySelectorAll('nav button').forEach(x => x.classList.toggle('on', x === b));
  document.querySelectorAll('.page').forEach(p => p.classList.toggle('on', p.id === 'page-' + b.dataset.page));
  if (b.dataset.page === 'act') loadActivity();
});

// ── Now Playing ──
const fmt = s => { if (!isFinite(s) || s < 0) return '--:--';
  const h = ~~(s/3600), m = ~~((s%3600)/60), ss = ~~(s%60);
  return (h ? h + ':' + String(m).padStart(2,'0') : m) + ':' + String(ss).padStart(2,'0'); };
const PLAY = 'M8 5v14l11-7L8 5z', PAUSE = 'M6 5h4v14H6zM14 5h4v14h-4z';
let pollTimer = null;
async function poll(){
  clearTimeout(pollTimer);
  try {
    const d = await api('/status');
    $('conn-dot').classList.add('on');
    $('np-title').textContent = d.title && d.title !== 'No media' ? d.title : 'Nothing playing';
    $('np-sub').textContent = d.title && d.title !== 'No media'
      ? (d.paused ? 'Paused on desktop' : 'Playing on desktop') : 'Play something from Search, or on the desktop.';
    $('t-pos').textContent = fmt(d.pos); $('t-dur').textContent = fmt(d.dur);
    $('i-pp').firstElementChild.setAttribute('d', d.paused ? PLAY : PAUSE);
    if (!seekHeld && d.dur > 0) $('seek').value = d.pos / d.dur * 100;
    if (!volHeld) $('vol').value = d.vol;
  } catch { $('conn-dot').classList.remove('on'); }
  pollTimer = setTimeout(poll, 1000);
}
let seekHeld = false, volHeld = false;
$('seek').addEventListener('pointerdown', () => seekHeld = true);
$('seek').addEventListener('change', () => { api('/seek_pct?v=' + Math.round($('seek').value)).catch(()=>{}); seekHeld = false; });
$('vol').addEventListener('pointerdown', () => volHeld = true);
$('vol').addEventListener('change', () => { api('/volume?v=' + Math.round($('vol').value)).catch(()=>{}); volHeld = false; });
$('b-toggle').onclick = () => api('/toggle').then(poll).catch(()=>{});
$('b-back').onclick   = () => api('/back').catch(()=>{});
$('b-fwd').onclick    = () => api('/fwd').catch(()=>{});
$('b-mute').onclick   = () => api('/mute').catch(()=>{});
$('b-sub').onclick    = () => api('/next_sub').catch(()=>{});
$('b-aud').onclick    = () => api('/next_audio').catch(()=>{});
$('b-fs').onclick     = () => api('/fullscreen').catch(()=>{});

// ── Search ──
const esc = s => { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; };
let searchWatch = null;
$('go').onclick = () => runSearch();
$('q').addEventListener('keydown', e => { if (e.key === 'Enter') { runSearch(); $('q').blur(); } });
function runSearch(){
  const q = $('q').value.trim(); if (!q) return;
  $('search-hint').innerHTML = '<span class="spin"></span> Searching all sources…';
  $('results').innerHTML = '';
  api('/search?q=' + encodeURIComponent(q)).catch(()=>{});
  clearInterval(searchWatch);
  let ticks = 0;
  searchWatch = setInterval(async () => {
    ticks++;
    try {
      const d = await api('/search');
      renderResults(d.results || []);
      if ((!d.searching && ticks > 2) || ticks > 40) {
        clearInterval(searchWatch);
        $('search-hint').textContent = (d.results || []).length + ' results — tap to play on the desktop.';
      }
    } catch { clearInterval(searchWatch); }
  }, 900);
}
function renderResults(rs){
  $('results').innerHTML = rs.slice(0, 60).map(r => `
    <div class="result">
      <div class="t">${esc(r.title)}</div>
      <div class="m">
        ${r.seeds ? `<span>▲ ${esc(String(r.seeds))}</span>` : ''}
        ${r.size ? `<span>${esc(String(r.size))}</span>` : ''}
        <span class="src">${esc(r.source || '')}</span>
        <button class="play" data-url="${encodeURIComponent(r.magnet || r.url || '')}">Play</button>
      </div>
    </div>`).join('') || '<div class="empty">No results yet</div>';
  $('results').querySelectorAll('.play').forEach(b => b.onclick = () => {
    const u = b.dataset.url; if (!u) return;
    b.textContent = 'Sent ✓';
    api('/load?url=' + u).catch(()=>{});
  });
}

// ── Activity ──
async function loadActivity(){
  try {
    const q = await api('/queue');
    $('queue').innerHTML = (q.items || []).map(i =>
      `<div class="file"><div class="n">${esc(i.title || i.name || '')}</div></div>`).join('')
      || '<div class="empty">Queue is empty</div>';
  } catch { $('queue').innerHTML = '<div class="empty">—</div>'; }
  try {
    const d = await api('/downloads');
    $('downloads').innerHTML = (d.files || []).slice(0, 40).map(f => {
      const name = typeof f === 'string' ? f : (f.name || '');
      return `<div class="file"><div class="n">${esc(name)}</div>
        <button class="play" data-n="${encodeURIComponent(name)}">Play</button></div>`;
    }).join('') || '<div class="empty">No downloads</div>';
    $('downloads').querySelectorAll('.play').forEach(b => b.onclick = () => {
      b.textContent = 'Sent ✓';
      api('/downloads/play?file=' + b.dataset.n).catch(()=>{});
    });
  } catch { $('downloads').innerHTML = '<div class="empty">—</div>'; }
  try {
    const h = await api('/history');
    $('history').innerHTML = (h.items || []).slice(0, 20).map(i =>
      `<div class="file"><div class="n">${esc(i.title || i.name || '')}</div></div>`).join('')
      || '<div class="empty">No history</div>';
  } catch { $('history').innerHTML = '<div class="empty">—</div>'; }
}

// ── Boot ──
if (TOKEN) paired(); else unpair();
</script>
</body>
</html>
