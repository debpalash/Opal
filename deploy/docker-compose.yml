# Opal — headless server
#
# NOT verifiable on macOS dev. Run on a real Linux/Docker host, from repo root:
#   docker compose -f deploy/docker-compose.yml up --build -d
services:
  opal:
    build:
      context: ..
      dockerfile: Dockerfile
    image: opal:headless
    restart: unless-stopped
    environment:
      # Triggers state.app.is_headless -> JSON API binds 0.0.0.0 (see T6).
      OPAL_HEADLESS: "1"
    ports:
      - "41595:41595" # web UI + JSON API (single port; pairing code in `docker compose logs`)
    volumes:
      # Mount config.json + api.token under /config/opal/ (XDG_CONFIG_HOME=/config).
      # Paths are relative to this file; ../ keeps runtime data at the repo root.
      - ../data/config:/config
      - ../data/cache:/cache
      - ../data/media:/media
